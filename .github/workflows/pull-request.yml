name: Pull Request Validation

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint

    - name: Unit tests (vitest)
      run: npm run test -- --run

    - name: Build project
      run: npm run build

    # Best-effort PR comment. Skipped for forked PRs (no write token) and never
    # fails the job — the gate is tsc/lint/test/build above, not the comment.
    - name: Comment PR
      if: success() && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: 'Build Validation Passed\n\nThis pull request has been validated and is ready for review.\n\nNode.js Version: 20.x\nCommit: ${{ github.sha }}'
          })

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    # Fail only on HIGH/CRITICAL (count from metadata, not all advisories). The
    # residual ~9 moderate advisories are transitive axios via the square SDK;
    # axios 1.18.1 is the latest published version (no upstream fix available).
    - name: Check for high/critical vulnerabilities
      run: |
        npm audit --json > audit.json || true
        HIGH=$(jq '.metadata.vulnerabilities.high' audit.json)
        CRIT=$(jq '.metadata.vulnerabilities.critical' audit.json)
        echo "high=$HIGH critical=$CRIT  (moderate advisories are transitive axios via square SDK — axios 1.18.1 is latest)"
        if [ "$HIGH" -gt 0 ] || [ "$CRIT" -gt 0 ]; then
          echo "::error::High/critical vulnerabilities detected"
          npm audit --audit-level=high
          exit 1
        fi
        echo "No high/critical vulnerabilities."

  smoke:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium

    # The dev server boots from this env; specs self-seed via /api/test/seed
    # (non-prod). Traklet disabled so its dev overlay can't intercept clicks.
    - name: Run smoke tests
      run: npm run test:smoke:ci
      env:
        JWT_SECRET: ci-smoke-jwt-secret-do-not-use-in-prod-0123456789
        NEXTAUTH_SECRET: ci-smoke-jwt-secret-do-not-use-in-prod-0123456789
        NEXT_PUBLIC_APP_URL: http://localhost:7777
        PUBLIC_APP_URL: http://localhost:7777

    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
