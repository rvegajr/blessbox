name: Production Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Never let two production deploys migrate the prod DB at the same time.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type check
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint

    - name: Unit tests (vitest)
      run: npm run test -- --run

    - name: Run build validation
      run: npm run build

    # Apply DB migrations BEFORE deploying new code. The migrator is forward-only
    # and idempotent: on first run it adopts the existing prod schema (pre-seeds
    # the baseline) and applies pending migrations (e.g. the coupon-fields fix);
    # subsequent runs are no-ops. A failure here fails the deploy (no half-migrated
    # prod serving new code). Requires TURSO_* GitHub Actions secrets.
    - name: Apply DB migrations (prod Turso)
      run: npm run db:migrate:deploy
      env:
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

    - name: Deploy to Vercel Production
      run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Create Release
      if: success()
      continue-on-error: true
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Production Deployment

          Changes in this release:
          - Automated deployment from main branch
          - Build validated and deployed to production

          Live URL: https://www.blessbox.org

          Deployment Details:
          - Commit: ${{ github.sha }}
          - Workflow: ${{ github.workflow }}
          - Run ID: ${{ github.run_id }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
