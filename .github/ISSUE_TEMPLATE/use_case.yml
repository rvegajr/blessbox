name: Use Case / Test Case
description: Define a user-facing feature or flow — Traklet will parse the sections for guided testing
title: "[Use Case]: "
labels: ["use-case"]
body:
  - type: markdown
    attributes:
      value: |
        This template produces a **Traklet-structured** issue body. The hidden markers let the Traklet widget present each section as a guided tester checklist. Fill in every section — Traklet uses all of them.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What does this test case verify? One clear sentence.
      placeholder: "Attendees can scan a QR code, fill in the registration form, and receive a check-in QR on the success page — no login required."
      value: |
        <span style="display:none">{traklet:section:objective}</span>
        ## Objective
        _Describe what this test case verifies._
        <span style="display:none">{/traklet:section:objective}</span>
    validations:
      required: true

  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites
      description: What needs to be set up before testing? Include seed commands.
      value: |
        <span style="display:none">{traklet:section:prerequisites}</span>
        ## Prerequisites

        ```bash
        # Seed a test org (creates org, QR codes, and a sample registration)
        SEED=$(curl -s -X POST http://localhost:7777/api/test/seed \
          -H 'Content-Type: application/json' \
          -d '{"seedKey":"my-test"}')
        echo $SEED | jq '{orgSlug, contactEmail, organizationId}'
        ```

        - Dev server running: `npm run dev` (http://localhost:7777)
        - Test auth cookies: `bb_test_auth=1; bb_test_email=<contactEmail>`
        <span style="display:none">{/traklet:section:prerequisites}</span>
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: Exact numbered steps a tester follows. Include URLs and what to click.
      value: |
        <span style="display:none">{traklet:section:steps}</span>
        ## Steps

        1. _Step 1_
        2. _Step 2_
        3. _Step 3_
        <span style="display:none">{/traklet:section:steps}</span>
    validations:
      required: true

  - type: textarea
    id: expected-result
    attributes:
      label: Expected Result
      description: What should happen when the test passes?
      value: |
        <span style="display:none">{traklet:section:expected-result}</span>
        ## Expected Result

        - ✅ _Expected outcome 1_
        - ✅ _Expected outcome 2_
        <span style="display:none">{/traklet:section:expected-result}</span>
    validations:
      required: true

  - type: textarea
    id: actual-result
    attributes:
      label: Actual Result
      description: Fill this in when you run the test.
      value: |
        <span style="display:none">{traklet:section:actual-result}</span>
        ## Actual Result
        _Not yet tested._
        <span style="display:none">{/traklet:section:actual-result}</span>

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste a Jam.dev recording link or drag-drop a screenshot here after testing.
      value: |
        <span style="display:none">{traklet:section:evidence}</span>
        ## Evidence
        _No recordings or screenshots attached yet._

        > **Tip:** Use [Jam.dev](https://jam.dev) to record your testing session, then paste the link here.
        <span style="display:none">{/traklet:section:evidence}</span>

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any additional context — related issues, known limitations, environment quirks.
      value: |
        <span style="display:none">{traklet:section:diagnostics}</span>
        ## Diagnostics
        _Diagnostics will be auto-attached when submitting results via Traklet._
        <span style="display:none">{/traklet:section:diagnostics}</span>

        <span style="display:none">{traklet:section:notes}</span>
        ## Notes
        _Routes involved:_
        _Area:_
        <span style="display:none">{/traklet:section:notes}</span>
