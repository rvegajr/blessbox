# gitleaks config for BlessBox — blocks the credential classes that have leaked
# into committed markdown/scripts before (Square access tokens, SendGrid keys).
title = "BlessBox secret scan"

[extend]
useDefault = true

[[rules]]
id = "square-access-token"
description = "Square access token (sandbox or production)"
regex = '''EAAA[A-Za-z0-9_-]{40,}'''
keywords = ["EAAA"]

[[rules]]
id = "sendgrid-api-key"
description = "SendGrid API key"
regex = '''SG\.[A-Za-z0-9_-]{16,}\.[A-Za-z0-9_-]{16,}'''
keywords = ["SG."]

[[rules]]
id = "noctusoft-relay-key"
description = "Noctusoft relay admin/deploy key"
regex = '''nsins_(sk|dk|test)_[A-Za-z0-9_-]{16,}'''
keywords = ["nsins_"]

[allowlist]
description = "Placeholders, examples, and redaction markers — not real secrets"
regexes = [
  '''SG\.your[_-]?key''',
  '''SG\.xxxx''',
  '''EAAA\.\.\.''',
  '''\[REDACTED\]''',
  # Example/placeholder API-key strings used in source + docs (not secrets).
  '''abc123[-_]def456([-_]ghi789)?''',
  '''YOUR[_-][A-Z_]+''',
  '''your[-_]secret[-_]here''',
  # Redaction markers left by the history purge (git filter-repo).
  '''\*\*\*(SQUARE_TOKEN|SENDGRID_KEY|JWT)_REDACTED\*\*\*''',
  # UUID-format example tokens in test fixtures (e.g. check-in tokens) — not secrets.
  '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}''',
]
